<section class="counters-section scroll-animate-container">
  <div class="container">
    <div class="counters-grid">
      <div class="counter-card fade-in-load">
        <div class="counter-icon"><i class="fas fa-history"></i></div>
        <div class="counter-number-wrapper"><span class="counter-value" data-target="7">0</span><span class="counter-suffix">+</span></div>
        <p class="counter-desc">років на ринку міжнародної логістики</p>
      </div>
      <div class="counter-card fade-in-load">
        <div class="counter-icon"><i class="fas fa-car-side"></i></div>
        <div class="counter-number-wrapper"><span class="counter-value" data-target="15000">0</span><span class="counter-suffix">+</span></div>
        <p class="counter-desc">успішно доставлених автомобілів</p>
      </div>
      <div class="counter-card fade-in-load">
        <div class="counter-icon"><i class="fas fa-headset"></i></div>
        <div class="counter-number-wrapper"><span class="counter-value" data-target="24">0</span><span class="counter-suffix">/7</span></div>
        <p class="counter-desc">диспетчерська підтримка та трекінг</p>
      </div>
      <div class="counter-card fade-in-load">
        <div class="counter-icon"><i class="fas fa-shield-alt"></i></div>
        <div class="counter-number-wrapper"><span class="counter-value" data-target="100">0</span><span class="counter-suffix">%</span></div>
        <p class="counter-desc">застраховані вантажі (CMR-страхування)</p>
      </div>
    </div>
  </div>
</section>
